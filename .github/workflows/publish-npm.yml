name: Publish Release Packages

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref or release tag to publish, for example `ades-tool-v0.2.4`
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release-version.outputs.release_version }}
      manifest_path: ${{ steps.validate.outputs.manifest_path }}
      tarball_path: ${{ steps.validate.outputs.tarball_path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Resolve release version
        id: release-version
        run: |
          RELEASE_VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          payload = Path("src/ades/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', payload)
          if not match:
              raise SystemExit("Unable to parse src/ades/version.py")
          print(match.group(1))
          PY
          )"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release artifacts
        id: validate
        run: |
          mkdir -p dist/release-validation/python dist/release-validation/npm
          ades release validate --output-dir dist/release-validation > dist/release-validation/validation.json
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          def stage_artifact(source_path: str, destination_dir: Path) -> Path:
              source = Path(source_path)
              destination = destination_dir / source.name
              if source.resolve() != destination.resolve():
                  shutil.copy2(source, destination)
              return destination

          payload = json.loads(Path("dist/release-validation/validation.json").read_text())
          manifest_path = payload["manifest_path"]
          tarball_path = payload["manifest"]["verification"]["npm_tarball"]["path"]
          wheel_path = payload["manifest"]["verification"]["wheel"]["path"]
          sdist_path = payload["manifest"]["verification"]["sdist"]["path"]
          python_dir = Path("dist/release-validation/python")
          npm_dir = Path("dist/release-validation/npm")
          copied_wheel_path = stage_artifact(wheel_path, python_dir)
          copied_sdist_path = stage_artifact(sdist_path, python_dir)
          copied_tarball_path = stage_artifact(tarball_path, npm_dir)
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"manifest_path={manifest_path}\n")
              fh.write(f"wheel_path={copied_wheel_path}\n")
              fh.write(f"sdist_path={copied_sdist_path}\n")
              fh.write(f"tarball_path={copied_tarball_path}\n")
          PY

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ steps.release-version.outputs.release_version }}
          path: dist/release-validation/

  publish-pypi:
    needs:
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-validation-${{ needs.validate-release.outputs.release_version }}
          path: dist/release-validation

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/release-validation/python

  publish-npm:
    needs:
      - validate-release
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-validation-${{ needs.validate-release.outputs.release_version }}
          path: dist/release-validation

      - name: Publish npm package
        run: npm publish --provenance --access public "${{ needs.validate-release.outputs.tarball_path }}"
