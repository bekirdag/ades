name: Publish npm Package

on:
  workflow_run:
    workflows:
      - Release Please
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref or release tag to publish, for example `ades-tool-v0.2.4`
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  validate-release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve-release.outputs.release_ref }}
      release_version: ${{ steps.release-version.outputs.release_version }}
      tarball_path: ${{ steps.validate.outputs.tarball_path }}
    steps:
      - name: Resolve release ref
        id: resolve-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_ref=${{ inputs.release_ref }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          head_sha = os.environ["RELEASE_WORKFLOW_HEAD_SHA"]
          run_id = os.environ["RELEASE_WORKFLOW_RUN_ID"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/releases?per_page=20",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              releases = json.load(response)

          release_ref = ""
          for release in releases:
              if str(release.get("target_commitish") or "") == head_sha:
                  release_ref = str(release.get("tag_name") or "")
                  break

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"release_ref={release_ref}\n")

          if not release_ref:
              print(
                  f"No GitHub release matched head SHA {head_sha} from Release Please run {run_id}; skipping npm publish."
              )
          PY

      - name: Check out repository
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-release.outputs.release_ref }}

      - name: Set up Python
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install release tooling
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Resolve release version
        id: release-version
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        run: |
          RELEASE_VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          payload = Path("src/ades/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', payload)
          if not match:
              raise SystemExit("Unable to parse src/ades/version.py")
          print(match.group(1))
          PY
          )"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release artifacts
        id: validate
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        run: |
          mkdir -p dist/release-validation/npm
          ades release validate --output-dir dist/release-validation > dist/release-validation/validation.json
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          def stage_artifact(source_path: str, destination_dir: Path) -> Path:
              source = Path(source_path)
              destination = destination_dir / source.name
              if source.resolve() != destination.resolve():
                  shutil.copy2(source, destination)
              return destination

          payload = json.loads(Path("dist/release-validation/validation.json").read_text())
          tarball_path = payload["manifest"]["verification"]["npm_tarball"]["path"]
          npm_dir = Path("dist/release-validation/npm")
          copied_tarball_path = stage_artifact(tarball_path, npm_dir)
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"tarball_path={copied_tarball_path}\n")
          PY

      - name: Upload validation artifacts
        if: ${{ steps.resolve-release.outputs.release_ref != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-validation-${{ steps.release-version.outputs.release_version }}
          path: dist/release-validation/

  publish-npm:
    needs:
      - validate-release
    if: ${{ needs.validate-release.outputs.release_ref != '' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-release-validation-${{ needs.validate-release.outputs.release_version }}
          path: dist/release-validation

      - name: Publish npm package
        run: npm publish --provenance --access public "${{ needs.validate-release.outputs.tarball_path }}"
