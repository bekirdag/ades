name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ADES_DEPLOY_HOST: 178.105.13.134
  ADES_DEPLOY_PORT: "34251"
  ADES_DEPLOY_USER: deploy
  ADES_PACK_OBJECT_STORAGE_BUCKET: ${{ secrets.ADES_PACK_OBJECT_STORAGE_BUCKET }}
  ADES_PACK_OBJECT_STORAGE_ENDPOINT: ${{ secrets.ADES_PACK_OBJECT_STORAGE_ENDPOINT }}
  ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID }}
  ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ades-prod
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run test suite
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: Prepare deploy registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/registry
          ades registry prepare-deploy-release --output-dir dist/registry

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(ls dist/ades_tool-*.whl | head -n 1)"
          release_id="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::12}"
          echo "wheel_path=$wheel_path" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$wheel_path")" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          ADES_PROD_SSH_KEY: ${{ secrets.ADES_PROD_SSH_KEY }}
          ADES_PROD_KNOWN_HOSTS: ${{ secrets.ADES_PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$ADES_PROD_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$ADES_PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload release artifacts
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            shift
            local try=1
            while true; do
              if "$@"; then
                return 0
              fi
              local exit_code=$?
              if [ "$try" -ge "$attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed with exit code $exit_code; retrying in 15s ($try/$attempts)..." >&2
              try=$((try + 1))
              sleep 15
            done
          }
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          scp_cmd=(
            scp
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -P "$ADES_DEPLOY_PORT"
          )
          release_id="${{ steps.release.outputs.release_id }}"
          wheel_path="${{ steps.release.outputs.wheel_path }}"
          wheel_name="${{ steps.release.outputs.wheel_name }}"
          upload_registry() {
            tar -C dist/registry -cf - . | "${ssh_cmd[@]}" "tar -C /mnt/ades/repo/releases/$release_id -xf -"
          }

          retry 5 "${ssh_cmd[@]}" "mkdir -p /mnt/ades/app/releases/$release_id /mnt/ades/repo/releases/$release_id"
          retry 5 "${scp_cmd[@]}" "$wheel_path" "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST:/mnt/ades/app/releases/$release_id/$wheel_name"
          retry 5 upload_registry

      - name: Sync registry to object storage
        if: ${{ env.ADES_PACK_OBJECT_STORAGE_BUCKET != '' && env.ADES_PACK_OBJECT_STORAGE_ENDPOINT != '' && env.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID != '' && env.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY != '' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ env.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          aws s3 sync dist/registry "s3://$ADES_PACK_OBJECT_STORAGE_BUCKET/" \
            --delete \
            --endpoint-url "https://$ADES_PACK_OBJECT_STORAGE_ENDPOINT" \
            --only-show-errors

      - name: Install release and restart service
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            shift
            local try=1
            while true; do
              if "$@"; then
                return 0
              fi
              local exit_code=$?
              if [ "$try" -ge "$attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed with exit code $exit_code; retrying in 15s ($try/$attempts)..." >&2
              try=$((try + 1))
              sleep 15
            done
          }
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          release_id="${{ steps.release.outputs.release_id }}"
          wheel_name="${{ steps.release.outputs.wheel_name }}"
          remote_install_script="$(mktemp)"
          trap 'rm -f "$remote_install_script"' EXIT
          cat > "$remote_install_script" <<'REMOTE_SCRIPT'
          set -euo pipefail
          release_id="$1"
          wheel_name="$2"
          release_root="/mnt/ades/repo/releases/$release_id"
          pack_entry_count() {
            local manifest_path="$1"
            python3 - "$manifest_path" <<'PY'
          import json
          import sys

          try:
              with open(sys.argv[1], encoding="utf-8") as handle:
                  payload = json.load(handle)
              print(int((payload.get("matcher") or {}).get("entry_count") or 0))
          except Exception:
              print(0)
          PY
          }
          /mnt/ades/app/shared/.venv/bin/python -m pip install --disable-pip-version-check --force-reinstall --no-deps "/mnt/ades/app/releases/$release_id/$wheel_name"
          /mnt/ades/app/shared/.venv/bin/python -m pip install --disable-pip-version-check --upgrade "psycopg[binary]>=3.2,<4.0"
          previous_repo_current="$(readlink -f /mnt/ades/repo/current 2>/dev/null || true)"
          switch_repo_current=1
          if [ -n "$previous_repo_current" ] \
            && [ -f "$previous_repo_current/packs/general-en/manifest.json" ] \
            && [ -f "$release_root/packs/general-en/manifest.json" ]; then
            existing_general_entries="$(pack_entry_count "$previous_repo_current/packs/general-en/manifest.json")"
            new_general_entries="$(pack_entry_count "$release_root/packs/general-en/manifest.json")"
            if [ "$existing_general_entries" -ge 1000000 ] && [ "$new_general_entries" -lt 1000000 ]; then
              echo "Prepared deploy registry has starter general-en ($new_general_entries entries); preserving existing repo current with $existing_general_entries entries."
              switch_repo_current=0
            fi
          fi
          if [ "$switch_repo_current" -eq 1 ]; then
            ln -sfn "$release_root" /mnt/ades/repo/current
          fi
          XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart ades.service
          timeout 90s bash -c 'until curl --connect-timeout 5 --max-time 10 -fsS http://127.0.0.1:8734/healthz >/dev/null; do sleep 2; done'
          curl --connect-timeout 5 --max-time 10 -fsS http://127.0.0.1:8734/v0/status >/dev/null
          curl --connect-timeout 5 --max-time 10 -fsS http://127.0.0.1:8734/v0/packs/available >/dev/null
          curl --connect-timeout 5 --max-time 10 -fsS http://127.0.0.1:6333/collections/ades-qids-current >/dev/null
          if command -v sudo >/dev/null 2>&1; then
            sudo -n systemctl reload nginx >/dev/null 2>&1 || sudo -n systemctl restart nginx >/dev/null 2>&1 || true
          fi
          python3 - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              "http://127.0.0.1:8734/v0/tag",
              data=json.dumps(
                  {
                      "text": "Anthropic announced a partnership with Amazon in San Francisco.",
                      "pack": "general-en",
                      "options": {
                          "include_related_entities": True,
                          "include_graph_support": True,
                          "refine_links": True,
                          "refinement_depth": "deep",
                      },
                  }
              ).encode("utf-8"),
              headers={"content-type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.load(response)

          graph_support = payload.get("graph_support") or {}
          warnings = list(graph_support.get("warnings") or [])
          if not graph_support.get("requested"):
              raise SystemExit("vector smoke check did not request graph support")
          disallowed = {
              "vector_search_disabled",
              "vector_search_url_missing",
              "vector_search_production_only",
          }
          if disallowed.intersection(warnings):
              raise SystemExit(
                  f"vector smoke check reported disabled production vector search: {warnings}"
              )
          if any(str(item).startswith("vector_search_failed:") for item in warnings):
              raise SystemExit(
                  f"vector smoke check reported qdrant failure: {warnings}"
              )
          PY
          REMOTE_SCRIPT
          run_remote_install() {
            "${ssh_cmd[@]}" "bash -s -- '$release_id' '$wheel_name'" < "$remote_install_script"
          }

          retry 5 run_remote_install

      - name: Verify public endpoints
        run: |
          set -euo pipefail
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/healthz >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/v0/status >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/v0/packs/available >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/healthz >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/v0/status >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/v0/packs/available >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://repo.adestool.com/index.json >/dev/null
