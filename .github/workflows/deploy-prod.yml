name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ADES_DEPLOY_HOST: ${{ secrets.ADES_DEPLOY_HOST || '95.70.192.142' }}
  ADES_DEPLOY_PORT: ${{ secrets.ADES_DEPLOY_PORT || '22' }}
  ADES_DEPLOY_USER: ${{ secrets.ADES_DEPLOY_USER || 'deploy' }}
  ADES_PACK_OBJECT_STORAGE_BUCKET: ${{ secrets.ADES_PACK_OBJECT_STORAGE_BUCKET }}
  ADES_PACK_OBJECT_STORAGE_ENDPOINT: ${{ secrets.ADES_PACK_OBJECT_STORAGE_ENDPOINT }}
  ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID }}
  ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ades-prod
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run test suite
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: Build starter impact graph artifact
        run: |
          set -euo pipefail
          mkdir -p dist/impact-market-graph
          python - <<'PY'
          from ades.impact.starter import build_starter_market_graph_store

          response = build_starter_market_graph_store(output_dir="dist/impact-market-graph")
          print(response.model_dump_json(indent=2))
          PY

      - name: Prepare deploy registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/registry
          ades registry prepare-deploy-release --output-dir dist/registry

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(ls dist/ades_tool-*.whl | head -n 1)"
          release_id="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::12}"
          echo "wheel_path=$wheel_path" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$wheel_path")" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          ADES_PROD_SSH_KEY: ${{ secrets.ADES_PROD_SSH_KEY }}
          ADES_PROD_KNOWN_HOSTS: ${{ secrets.ADES_PROD_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$ADES_PROD_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$ADES_PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload release artifacts
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            shift
            local try=1
            while true; do
              if "$@"; then
                return 0
              fi
              local exit_code=$?
              if [ "$try" -ge "$attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed with exit code $exit_code; retrying in 15s ($try/$attempts)..." >&2
              try=$((try + 1))
              sleep 15
            done
          }
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          scp_cmd=(
            scp
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -P "$ADES_DEPLOY_PORT"
          )
          release_id="${{ steps.release.outputs.release_id }}"
          wheel_path="${{ steps.release.outputs.wheel_path }}"
          wheel_name="${{ steps.release.outputs.wheel_name }}"
          upload_registry() {
            tar -C dist/registry -cf - . | "${ssh_cmd[@]}" "tar -C /mnt/ades/repo/releases/$release_id -xf -"
          }
          upload_impact_graph() {
            tar -C dist/impact-market-graph -cf - . | "${ssh_cmd[@]}" "tar -C /mnt/ades/impact/releases/$release_id -xf -"
          }

          retry 5 "${ssh_cmd[@]}" "mkdir -p /mnt/ades/app/releases/$release_id /mnt/ades/repo/releases/$release_id /mnt/ades/impact/releases/$release_id"
          retry 5 "${scp_cmd[@]}" "$wheel_path" "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST:/mnt/ades/app/releases/$release_id/$wheel_name"
          retry 5 upload_registry
          retry 5 upload_impact_graph

      - name: Sync registry to object storage
        if: ${{ env.ADES_PACK_OBJECT_STORAGE_BUCKET != '' && env.ADES_PACK_OBJECT_STORAGE_ENDPOINT != '' && env.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID != '' && env.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY != '' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ env.ADES_PACK_OBJECT_STORAGE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.ADES_PACK_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          set -euo pipefail
          aws s3 sync dist/registry "s3://$ADES_PACK_OBJECT_STORAGE_BUCKET/" \
            --delete \
            --endpoint-url "https://$ADES_PACK_OBJECT_STORAGE_ENDPOINT" \
            --only-show-errors

      - name: Install release and restart service
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            shift
            local try=1
            while true; do
              if "$@"; then
                return 0
              fi
              local exit_code=$?
              if [ "$try" -ge "$attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed with exit code $exit_code; retrying in 15s ($try/$attempts)..." >&2
              try=$((try + 1))
              sleep 15
            done
          }
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          release_id="${{ steps.release.outputs.release_id }}"
          wheel_name="${{ steps.release.outputs.wheel_name }}"
          remote_install_script=".github/scripts/ades_prod_remote_install.sh"
          run_remote_install() {
            "${ssh_cmd[@]}" "bash -s -- '$release_id' '$wheel_name'" < "$remote_install_script"
          }

          retry 5 run_remote_install

      - name: Sync public registry static root
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            shift
            local try=1
            while true; do
              if "$@"; then
                return 0
              fi
              local exit_code=$?
              if [ "$try" -ge "$attempts" ]; then
                return "$exit_code"
              fi
              echo "Command failed with exit code $exit_code; retrying in 15s ($try/$attempts)..." >&2
              try=$((try + 1))
              sleep 15
            done
          }
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          public_registry_sync_script=".github/scripts/ades_sync_public_registry.sh"
          run_public_registry_sync() {
            "${ssh_cmd[@]}" "bash -s" < "$public_registry_sync_script"
          }

          retry 4 run_public_registry_sync

      - name: Sync public service impact config
        shell: bash
        run: |
          set -euo pipefail
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o ConnectTimeout=30
            -o IdentitiesOnly=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o StrictHostKeyChecking=yes
            -p "$ADES_DEPLOY_PORT"
            "$ADES_DEPLOY_USER@$ADES_DEPLOY_HOST"
          )
          sync_status=1
          for attempt in 1 2 3 4; do
            if "${ssh_cmd[@]}" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail
          impact_current_root="$HOME/.local/share/ades-artifacts/market-graph/current"

          if ! command -v sudo >/dev/null 2>&1 || ! sudo -n true >/dev/null 2>&1; then
            echo "sudo is unavailable for root service sync; skipping root-level mirror."
            exit 0
          fi

          tmp_units="$(mktemp)"
          trap 'rm -f "$tmp_units" "$tmp_units.running"' EXIT
          printf '%s\n' "ades.service" "ades-api.service" > "$tmp_units"
          if sudo -n systemctl list-units --type=service --state=running --no-legend --plain --no-pager 2>/dev/null > "$tmp_units.running"; then
            awk '{print $1}' "$tmp_units.running" \
              | while IFS= read -r unit; do
                  [ -n "$unit" ] || continue
                  case "$unit" in
                    nginx.service|qdrant.service)
                      continue
                      ;;
                  esac
                  show="$(sudo -n systemctl show "$unit" -p ExecStart -p FragmentPath -p DropInPaths --no-pager 2>/dev/null || true)"
                  if printf '%s\n%s\n' "$unit" "$show" | grep -Eiq '(ades|adestool|/mnt/ades|uvicorn.*ades|gunicorn.*ades)'; then
                    printf '%s\n' "$unit"
                  fi
                done >> "$tmp_units"
          fi

          mapfile -t root_services < <(sort -u "$tmp_units")
          mirrored=0
          for root_service in "${root_services[@]}"; do
            if ! sudo -n systemctl is-active --quiet "$root_service"; then
              continue
            fi
            root_dropin_dir="/etc/systemd/system/$root_service.d"
            sudo -n install -d -m 755 "$root_dropin_dir"
            printf '%s\n' \
              "[Service]" \
              "Environment=ADES_IMPACT_EXPANSION_ENABLED=true" \
              "Environment=ADES_IMPACT_EXPANSION_ARTIFACT_PATH=$impact_current_root/market_graph_store.sqlite" \
              "Environment=ADES_IMPACT_EXPANSION_MAX_DEPTH=2" \
              "Environment=ADES_IMPACT_EXPANSION_SEED_LIMIT=16" \
              "Environment=ADES_IMPACT_EXPANSION_MAX_CANDIDATES=25" \
              "Environment=ADES_IMPACT_EXPANSION_MAX_EDGES_PER_SEED=64" \
              "Environment=ADES_IMPACT_EXPANSION_MAX_PATHS_PER_CANDIDATE=3" \
              "Environment=ADES_IMPACT_EXPANSION_VECTOR_PROPOSALS_ENABLED=false" \
              "Environment=ADES_GRAPH_CONTEXT_VECTOR_PROPOSALS_ENABLED=true" \
              "Environment=ADES_GRAPH_CONTEXT_VECTOR_PROPOSAL_LIMIT=8" \
              | sudo -n tee "$root_dropin_dir/zz-impact-expansion.conf" >/dev/null
            printf '%s\n' \
              "[Service]" \
              "Environment=ADES_NEWS_ANALYZE_ENABLED=true" \
              | sudo -n tee "$root_dropin_dir/zz-news-analyze.conf" >/dev/null
            mirrored=$((mirrored + 1))
          done

          if [ "$mirrored" -eq 0 ]; then
            echo "No active root-level ADES service found for impact drop-in mirror."
          else
            sudo -n systemctl daemon-reload
            for root_service in "${root_services[@]}"; do
              sudo -n systemctl is-active --quiet "$root_service" || continue
              sudo -n systemctl restart "$root_service"
            done
          fi
          REMOTE_SCRIPT
            then
              sync_status=0
              break
            fi
            sync_status=$?
            echo "Sync public service SSH attempt ${attempt} failed with exit ${sync_status}." >&2
            sleep $((attempt * 15))
          done
          exit "$sync_status"

      - name: Verify public endpoints
        run: |
          set -euo pipefail
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/healthz >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/v0/status >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://api.adestool.com/v0/packs/available >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/healthz >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/v0/status >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://adestool.com/v0/packs/available >/dev/null
          curl --retry 10 --retry-all-errors --retry-delay 10 --connect-timeout 5 --max-time 15 -fsS https://repo.adestool.com/index.json >/dev/null
          python3 - <<'PY'
          import json
          import sys
          import time
          import urllib.request

          headers = {"content-type": "application/json", "user-agent": "ades-prod-smoke/1.0"}

          def get_json(url: str) -> dict:
              request = urllib.request.Request(
                  url,
                  headers={
                      "user-agent": "ades-prod-smoke/1.0",
                      "cache-control": "no-cache",
                      "pragma": "no-cache",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def post_json(url: str, payload: dict) -> dict:
              request = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.load(response)

          status = get_json("https://api.adestool.com/v0/status")
          artifact = status.get("impact_artifact") or {}
          age_seconds = float(artifact.get("age_seconds") or 1_000_000_000)
          if age_seconds > 7200:
              raise SystemExit(f"public impact artifact is stale after deploy: {artifact}")

          expected_pack_versions = {
              "business-vector-en": "0.2.0",
              "economics-vector-en": "0.2.0",
              "politics-vector-en": "0.2.1",
          }
          registry_index = get_json(f"https://repo.adestool.com/index.json?prod_verify={int(time.time())}")
          registry_packs = registry_index.get("packs") or {}
          for pack_id, expected_version in expected_pack_versions.items():
              pack = registry_packs.get(pack_id) or {}
              if pack.get("version") != expected_version or pack.get("tier") != "domain":
                  raise SystemExit(f"public registry did not promote {pack_id}: {pack}")
          available_packs = get_json("https://api.adestool.com/v0/packs/available")
          available_by_id = {pack.get("pack_id"): pack for pack in available_packs}
          for pack_id, expected_version in expected_pack_versions.items():
              pack = available_by_id.get(pack_id) or {}
              if pack.get("version") != expected_version or pack.get("tier") != "domain":
                  raise SystemExit(f"public API did not promote {pack_id}: {pack}")
              installed_pack = get_json(f"https://api.adestool.com/v0/packs/{pack_id}")
              if installed_pack.get("version") != expected_version or installed_pack.get("tier") != "domain":
                  raise SystemExit(
                      f"public installed pack metadata did not promote {pack_id}: {installed_pack}"
                  )

          politics_response = post_json(
              "https://api.adestool.com/v0/tag",
              {
                  "text": (
                      "The North Atlantic Treaty Organization, United Nations, the U.S. State "
                      "Department, the Bureau of Industry and Security, UK Parliament, the "
                      "Electoral Commission, the International Energy Agency, and the United "
                      "States Geological Survey issued public updates."
                  ),
                  "pack": "politics-vector-en",
                  "options": {
                      "include_related_entities": True,
                      "include_graph_support": True,
                  },
              },
          )
          if politics_response.get("pack_version") != expected_pack_versions["politics-vector-en"]:
              raise SystemExit(
                  f"politics vector smoke used stale pack version: {politics_response.get('pack_version')!r}"
              )
          graph_support = politics_response.get("graph_support") or {}
          if not graph_support.get("applied"):
              raise SystemExit(f"politics vector graph support was not applied: {graph_support}")
          if not politics_response.get("related_entities"):
              raise SystemExit(f"politics vector smoke returned no related entities: {politics_response}")
          politics_qids = {
              str(((entity.get("link") or {}).get("entity_id") or ""))
              for entity in politics_response.get("entities") or []
          }
          required_politics_qids = {"Q7184", "Q1065", "Q789915", "Q455289"}
          missing_politics_qids = sorted(required_politics_qids - politics_qids)
          if missing_politics_qids:
              raise SystemExit(
                  f"politics vector smoke missing expected QIDs {missing_politics_qids}; "
                  f"qids={sorted(politics_qids)}"
              )

          options = {
              "include_passive_entities": True,
              "include_relationship_paths": True,
              "include_terminal_candidates": True,
              "include_tag_responses": False,
              "max_terminal_candidates": 16,
          }
          samples = {
              "tesla": {
                  "title": "Elon Musk says Tesla will expand battery production after new financing plan",
                  "text": "Elon Musk said Tesla will expand battery production after announcing a new financing plan. Investors reacted to the comments as Tesla shares moved in US trading.",
                  "packs": [],
                  "options": options,
                  "required_refs": {"finance-us-ticker:TSLA"},
              },
              "metals": {
                  "title": "Gold and silver rise as the dollar weakens before Fed decision",
                  "text": "Gold and silver prices rose as the US dollar weakened and traders prepared for the Federal Reserve rate decision.",
                  "packs": [],
                  "options": options,
                  "required_refs": {
                      "ades:impact:commodity:gold",
                      "ades:impact:commodity:silver",
                  },
              },
          }
          for name, payload in samples.items():
              required_refs = payload.pop("required_refs")
              response = post_json("https://api.adestool.com/v0/news/analyze", payload)
              refs = {
                  str(candidate.get("entity_ref"))
                  for candidate in response.get("terminal_impact_candidates") or []
              }
              missing = sorted(required_refs - refs)
              if missing:
                  raise SystemExit(
                      f"news analyze smoke {name} missing {missing}; refs={sorted(refs)}"
                  )
          print(json.dumps({"impact_age_seconds": age_seconds, "news_analyze": "ok"}, sort_keys=True))
          PY
