name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      sha: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  validate-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      manifest_path: ${{ steps.validate.outputs.manifest_path }}
      tarball_path: ${{ steps.validate.outputs.tarball_path }}
      wheel_path: ${{ steps.validate.outputs.wheel_path }}
      sdist_path: ${{ steps.validate.outputs.sdist_path }}
    steps:
      - name: Check out released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify released version matches checked-out sources
        run: |
          RELEASE_VERSION="${{ needs.release-please.outputs.version }}"
          PYTHON_VERSION="$(python - <<'PY'
          from pathlib import Path
          import re

          payload = Path("src/ades/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', payload)
          if not match:
              raise SystemExit("Unable to parse src/ades/version.py")
          print(match.group(1))
          PY
          )"
          PYPROJECT_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          payload = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', payload, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to parse pyproject.toml")
          print(match.group(1))
          PY
          )"
          PACKAGE_VERSION="$(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("npm/ades/package.json").read_text(encoding="utf-8"))
          print(payload["version"])
          PY
          )"
          if [ "$RELEASE_VERSION" != "$PYTHON_VERSION" ]; then
            echo "Release Please version $RELEASE_VERSION does not match Python version $PYTHON_VERSION" >&2
            exit 1
          fi
          if [ "$RELEASE_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Release Please version $RELEASE_VERSION does not match pyproject version $PYPROJECT_VERSION" >&2
            exit 1
          fi
          if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release Please version $RELEASE_VERSION does not match npm version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Validate release artifacts
        id: validate
        run: |
          mkdir -p dist/release-validation/python dist/release-validation/npm
          ades release validate --output-dir dist/release-validation > dist/release-validation/validation.json
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          def stage_artifact(source_path: str, destination_dir: Path) -> Path:
              source = Path(source_path)
              destination = destination_dir / source.name
              if source.resolve() != destination.resolve():
                  shutil.copy2(source, destination)
              return destination

          payload = json.loads(Path("dist/release-validation/validation.json").read_text())
          manifest_path = payload["manifest_path"]
          wheel_path = payload["manifest"]["verification"]["wheel"]["path"]
          sdist_path = payload["manifest"]["verification"]["sdist"]["path"]
          tarball_path = payload["manifest"]["verification"]["npm_tarball"]["path"]
          python_dir = Path("dist/release-validation/python")
          npm_dir = Path("dist/release-validation/npm")
          copied_wheel_path = stage_artifact(wheel_path, python_dir)
          copied_sdist_path = stage_artifact(sdist_path, python_dir)
          copied_tarball_path = stage_artifact(tarball_path, npm_dir)
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"manifest_path={manifest_path}\n")
              fh.write(f"wheel_path={copied_wheel_path}\n")
              fh.write(f"sdist_path={copied_sdist_path}\n")
              fh.write(f"tarball_path={copied_tarball_path}\n")
          PY

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ needs.release-please.outputs.version }}
          path: dist/release-validation/

  publish-pypi:
    needs:
      - release-please
      - validate-release
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-validation-${{ needs.release-please.outputs.version }}
          path: dist/release-validation

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/release-validation/python
